# Endurecimiento de la cadena de suministro (pnpm >= 10).
# minimumReleaseAge: no instalar versiones con menos de 7 días (10080 min) → da
#   tiempo a que el registro cace y despublique paquetes con malware recién subido.
# trustPolicy: no-downgrade → rechaza paquetes cuya confianza (provenance/firmas)
#   se debilita entre resoluciones.
# blockExoticSubdeps: bloquea subdependencias que no vengan del registro (git:, file:, tarball).
minimumReleaseAge: 10080
trustPolicy: no-downgrade
# Excepciones auditadas a `no-downgrade`: dependencias transitivas legítimas del
# árbol de Next.js que disparan la política por no publicar provenance de forma
# consistente (solo firmas npm). Verificadas una a una: mismo publisher de
# siempre, con firmas, meses/años en uso. Revisar antes de ampliar esta lista.
#   - undici-types@6.21.0                       vía @types/node@^20   (publisher: matteo.collina, lead de undici)
#   - eslint-import-resolver-typescript@3.10.1  vía eslint-config-next (publisher: jounqin, mantenedor real)
#   - semver@6.3.1                              transitiva de tooling  (publisher: equipo npm CLI)
trustPolicyExclude:
  - undici-types
  - eslint-import-resolver-typescript
  - semver
blockExoticSubdeps: true
allowBuilds:
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
